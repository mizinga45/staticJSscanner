<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#0a0e1a"/>
  
  <!-- Circuit lines -->
  <g stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.3">
    <path d="M50 300h150l20-20h80"/>
    <path d="M500 300h150l20 20h80"/>
    <path d="M400 100v50l-20 20v30"/>
    <path d="M400 450v50l20 20v30"/>
    <path d="M150 150l30 30h60l20 20"/>
    <path d="M650 150l-30 30h-60l-20 20"/>
    <path d="M150 450l30-30h60l20-20"/>
    <path d="M650 450l-30-30h-60l-20-20"/>
    <!-- Circuit nodes -->
    <circle cx="50" cy="300" r="3" fill="#3b82f6"/>
    <circle cx="300" cy="280" r="3" fill="#3b82f6"/>
    <circle cx="500" cy="300" r="3" fill="#3b82f6"/>
    <circle cx="750" cy="320" r="3" fill="#3b82f6"/>
    <circle cx="400" cy="100" r="3" fill="#3b82f6"/>
    <circle cx="400" cy="550" r="3" fill="#3b82f6"/>
    <circle cx="150" cy="150" r="3" fill="#8b5cf6"/>
    <circle cx="650" cy="150" r="3" fill="#8b5cf6"/>
    <circle cx="150" cy="450" r="3" fill="#8b5cf6"/>
    <circle cx="650" cy="450" r="3" fill="#8b5cf6"/>
  </g>
  
  <!-- Glow effect -->
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <circle cx="400" cy="300" r="200" fill="url(#glow)"/>
  
  <!-- Shield shape -->
  <path d="M400 180 L480 220 L480 320 Q480 380 400 420 Q320 380 320 320 L320 220 Z" 
        fill="none" stroke="url(#shieldGrad)" stroke-width="3" opacity="0.9"/>
  <path d="M400 195 L468 230 L468 315 Q468 368 400 405 Q332 368 332 315 L332 230 Z" 
        fill="#0a0e1a" fill-opacity="0.8" stroke="url(#shieldGrad)" stroke-width="1" opacity="0.5"/>
  
  <!-- Lock icon -->
  <rect x="378" y="300" width="44" height="36" rx="4" fill="none" stroke="url(#shieldGrad)" stroke-width="2.5"/>
  <path d="M386 300v-16a14 14 0 0 1 28 0v16" fill="none" stroke="url(#shieldGrad)" stroke-width="2.5"/>
  <circle cx="400" cy="315" r="5" fill="#3b82f6"/>
  <rect x="399" y="318" width="2" height="8" fill="#3b82f6"/>
  
  <!-- Outer glow ring -->
  <circle cx="400" cy="300" r="140" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="300" r="160" fill="none" stroke="#3b82f6" stroke-width="0.3" opacity="0.2"/>
</svg>
